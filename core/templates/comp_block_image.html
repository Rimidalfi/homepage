{% load wagtailimages_tags %}

<div class="flex flex-col not-prose overflow-hidden sm:rounded-3xl relative">

    {% image block.value.image fill-320x240 class="bg-emerald-500 w-full object-cover"%}
    
    {% if  block.value.heading %}
    <h3 class="text-white absolute top-0 p-3 backdrop-blur-sm bg-black/20 mt-4 ml-3 rounded-full">
            {{block.value.heading}}
    </h3>
    {% endif %}

    {% if  block.value.caption %}
    <p class="text-white absolute bottom-0 p-3 backdrop-blur-sm bg-black/10 w-full ">
        {{block.value.caption}}
    </p>
    {% endif %}

</div>
